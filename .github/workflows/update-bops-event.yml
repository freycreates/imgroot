name: Update next BOPS event

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-event:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Read The Other Side agenda
        run: python scripts/update_bops_event.py
      - name: Save an updated event
        run: |
          if git diff --quiet -- assets/bops-event.json; then
            echo "The event is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/bops-event.json
          git commit -m "Update next BOPS event"
          git push
